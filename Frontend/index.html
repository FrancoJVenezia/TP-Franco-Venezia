<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
		<link rel="stylesheet" href="styles.css">
		<script type="module" src="script.js"></script>
    <title>Frontend</title>
</head>
<body>

	<header class="navigation">
		<a id="homeBtn" class="nav-link" href="http://localhost:8080/">
			<i class="nav-icon">
				<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 576 512">
					<path fill="currentColor" d="M280.37 148.26L96 300.11V464a16 16 0 0 0 16 16l112.06-.29a16 16 0 0 0 15.92-16V368a16 16 0 0 1 16-16h64a16 16 0 0 1 16 16v95.64a16 16 0 0 0 16 16.05L464 480a16 16 0 0 0 16-16V300L295.67 148.26a12.19 12.19 0 0 0-15.3 0zM571.6 251.47L488 182.56V44.05a12 12 0 0 0-12-12h-56a12 12 0 0 0-12 12v72.61L318.47 43a48 48 0 0 0-61 0L4.34 251.47a12 12 0 0 0-1.6 16.9l25.5 31A12 12 0 0 0 45.15 301l235.22-193.74a12.19 12.19 0 0 1 15.3 0L530.9 301a12 12 0 0 0 16.9-1.6l25.5-31a12 12 0 0 0-1.7-16.93z"/>
				</svg>
			</i>
			<h3 class="nav-title">
				FrancoShop
			</h3>
		</a>

		<div style="display: flex; gap: 1rem;">
			<a id="productsBtn">
				Productos
			</a>
			<a>
				Acerca de
			</a>
			<a>
				Contacto
			</a>

		</div>

		<a id="loginBtn">
			Iniciar sesión
		</a>

		<a id="logoutBtn" class="d-none">
			Salir
		</a>
	</header>

	
	<main id="homeContainer" class="home-main">
		<div class="home-title">
			<h1>Bienvenido a FrancoShop</h1>
			<h3>Tu tienda de confianza</h3>
		</div>

		<div class="home-cards-container">
			<section class="card">
				<h4>¿Venis a comprar?	</h4>
				<a id="homeProductsBtn">Ver productos.</a>
			</section>
		
			<section class="card">
				<h4>¿Sos empleado?</h4>
				<a id="homeLoginBtn">Iniciar sesión.</a>
			</section>
		</div>
	</main>
	<br>


	<div id="loginContainer" class="d-none">
		<form id="loginForm" class="form-container">
			<div>
				<label for="username">Usuario:</label>
				<input type="text" id="username" name="username" minLength="4" maxlength="50" required>
			</div>
			
			<div>
				<label for="password">Contraseña:</label>
				<input type="password" id="password" name="password" minlength="4" maxlength="30" required>
			</div>
	
			<button id="login" type="submit">Iniciar Sesión</button>		
		</form>
	</div>

	<div id="productsContainer" class="d-none">
		Aca irian los productos
	</div>
</body>
</html>
